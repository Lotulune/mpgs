name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: "1"
  MPGS_BUILD_GIT_SHA: ${{ github.sha }}

jobs:
  web:
    name: Web test and build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Node.js 22
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@9.15.9 --activate

      - name: Install web dependencies
        run: pnpm install --frozen-lockfile

      - name: Run web tests
        run: pnpm --filter mpgs-web test

      - name: Build web client
        run: pnpm --filter mpgs-web build

  quality:
    name: Format, test, and lint
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Rust 1.97.0
        run: rustup toolchain install 1.97.0 --profile minimal --component rustfmt,clippy

      - name: Check formatting
        run: cargo +1.97.0 fmt --all -- --check

      - name: Run tests
        run: cargo +1.97.0 test --workspace --locked

      - name: Run Clippy
        run: cargo +1.97.0 clippy --workspace --all-targets --locked -- -D warnings

  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 35
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x64
            runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: mpgs-linux-x64
          - name: Linux ARM64
            runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            artifact: mpgs-linux-arm64
          - name: Windows x64
            runner: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: mpgs-windows-x64
          - name: Windows ARM64
            runner: windows-11-arm
            target: aarch64-pc-windows-msvc
            artifact: mpgs-windows-arm64
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Rust 1.97.0 target
        run: rustup toolchain install 1.97.0 --profile minimal --target ${{ matrix.target }}

      - name: Build release binaries
        run: cargo +1.97.0 build --workspace --release --locked --target ${{ matrix.target }}

      - name: Build traceable server package
        shell: pwsh
        run: ./scripts/package_server.ps1 -OutDir dist -Target ${{ matrix.target }} -SkipBuild

      - name: Upload traceable server package
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ matrix.artifact }}
          path: dist/mpgs-server-*/
          if-no-files-found: error
          retention-days: 14

  desktop-smoke:
    name: Tauri bundle smoke (${{ matrix.name }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 40
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux
            runner: ubuntu-latest
            bundle: deb
          - name: Windows
            runner: windows-latest
            bundle: nsis
          - name: macOS
            runner: macos-latest
            bundle: app
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Linux WebKit dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install Rust 1.97.0
        run: rustup toolchain install 1.97.0 --profile minimal

      - name: Install Node.js 22
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@9.15.9 --activate

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Build native desktop bundle
        run: pnpm exec tauri build --config apps/desktop/src-tauri/tauri.conf.json --ci --no-sign --bundles ${{ matrix.bundle }}

  desktop-e2e:
    name: Native desktop E2E (${{ matrix.name }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux
            runner: ubuntu-latest
          - name: Windows
            runner: windows-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Linux WebDriver dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            webkit2gtk-driver \
            xvfb

      - name: Install Rust 1.97.0
        run: rustup toolchain install 1.97.0 --profile minimal

      - name: Install tauri-driver 2.0.6
        run: cargo +1.97.0 install tauri-driver --version 2.0.6 --locked

      - name: Install matching Microsoft EdgeDriver
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cargo +1.97.0 install --git https://github.com/chippers/msedgedriver-tool --rev 8c4b34f51b45f5cf08013366d703de464ab871d1 msedgedriver-tool
          & "$HOME/.cargo/bin/msedgedriver-tool.exe"
          $PWD.Path >> $env:GITHUB_PATH

      - name: Install Node.js 22
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@9.15.9 --activate

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Build seeded API server
        run: cargo +1.97.0 build -p mpgs-server --locked

      - name: Build native Tauri test application
        run: pnpm exec tauri build --config apps/desktop/src-tauri/tauri.conf.json --config apps/desktop/src-tauri/tauri.e2e.conf.json --ci --no-sign --debug --no-bundle

      - name: Run native desktop E2E on Linux
        if: runner.os == 'Linux'
        run: xvfb-run -a pnpm --filter @mpgs/e2e test

      - name: Run native desktop E2E on Windows
        if: runner.os == 'Windows'
        run: pnpm --filter @mpgs/e2e test

      - name: Upload desktop E2E diagnostics
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: desktop-e2e-${{ runner.os }}
          path: e2e-tests/artifacts/
          if-no-files-found: warn
          retention-days: 14
