name: Container images

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/container-images.yml"
      - ".dockerignore"
      - "Dockerfile"
      - "Cargo.lock"
      - "Cargo.toml"
      - "apps/**"
      - "crates/**"
      - "deploy/**"
      - "migrations/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "web/**"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: container-images-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    name: Publish ${{ matrix.image }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: mpgs-server
            target: server
          - image: mpgs-web
            target: web
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Log in to GitHub Container Registry
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: echo "$GHCR_TOKEN" | docker login ghcr.io --username "$GITHUB_ACTOR" --password-stdin

      - name: Build and push release image
        env:
          IMAGE_NAME: ${{ matrix.image }}
          TARGET: ${{ matrix.target }}
        run: |
          owner=$(echo "$GITHUB_REPOSITORY_OWNER" | tr '[:upper:]' '[:lower:]')
          image="ghcr.io/$owner/$IMAGE_NAME"
          docker buildx create --use --name mpgs-builder
          docker buildx build \
            --target "$TARGET" \
            --build-arg MPGS_BUILD_PROFILE=release \
            --label "org.opencontainers.image.revision=$GITHUB_SHA" \
            --label "org.opencontainers.image.source=https://github.com/$GITHUB_REPOSITORY" \
            --cache-from "type=gha,scope=$TARGET" \
            --cache-to "type=gha,mode=max,scope=$TARGET" \
            --tag "$image:main" \
            --tag "$image:sha-$GITHUB_SHA" \
            --push \
            .
