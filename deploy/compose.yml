services:
  postgres:
    image: postgres:16-bookworm
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-mpgs}
      POSTGRES_USER: ${POSTGRES_USER:-mpgs}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 10

  mpgs-server:
    image: ${MPGS_IMAGE:-mpgs-server:local}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      MPGS_CONFIG_DIR: /var/lib/mpgs/config
    volumes:
      - ./config:/var/lib/mpgs/config
    ports:
      - "127.0.0.1:4310:4310"
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "--show-error", "http://127.0.0.1:4310/healthz"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3

volumes:
  postgres_data:
